name: Flutter Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      
      - name: Build APK
        run: |
          # إنشاء مشروع جديد
          cd /tmp
          flutter create --org com.flexyemen --project-name flex_yemen --platforms android .
          
          # نسخ الكود
          cp -r $GITHUB_WORKSPACE/lib .
          cp -r $GITHUB_WORKSPACE/assets . 2>/dev/null || true
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          
          # إنشاء مجلدات assets
          mkdir -p assets/images assets/icons assets/fonts assets/animations
          touch .env
          
          # إضافة الأذونات
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
          
          # إضافة قواعد ProGuard لتجاهل Play Core
          cat >> android/app/proguard-rules.pro << 'PROGUARD'
          # تجاهل مكتبات Google Play Core (لأننا لا نستخدمها)
          -dontwarn com.google.android.play.core.**
          -keep class com.google.android.play.core.** { *; }
          -dontwarn com.google.android.play.core.splitcompat.SplitCompatApplication
          -dontwarn com.google.android.play.core.splitinstall.**
          -dontwarn com.google.android.play.core.tasks.**
PROGUARD
          
          # بناء بدون minify (لتجنب مشاكل R8)
          flutter pub get
          flutter build apk --release --split-per-abi --no-shrink
          
          # عرض النتيجة
          echo "Build completed! APK files:"
          ls -la build/app/outputs/flutter-apk/
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/flex_yemen/build/app/outputs/flutter-apk/*.apk
