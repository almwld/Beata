name: Build Flex Yemen

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      
      - name: Build
        run: |
          cd /tmp
          flutter create --org com.flexyemen --project-name flexyemen .
          cd flexyemen
          
          cp -r $GITHUB_WORKSPACE/lib .
          cp -r $GITHUB_WORKSPACE/assets . 2>/dev/null || true
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          
          mkdir -p assets/images assets/icons assets/fonts assets/animations
          touch .env
          
          # تحديث minSdkVersion
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          
          # إضافة NDK
          sed -i '/android {/a\    ndkVersion "27.0.12077973"' android/app/build.gradle
          
          # إضافة multiDex
          sed -i '/defaultConfig {/a\        multiDexEnabled true' android/app/build.gradle
          
          # إضافة desugaring باستخدام printf (بدون heredoc)
          printf '\nandroid {\n    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n    }\n}\n\ndependencies {\n    implementation "androidx.multidex:multidex:2.0.1"\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"\n}\n' >> android/app/build.gradle
          
          # إضافة الأذونات
          printf '\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\n' >> android/app/src/main/AndroidManifest.xml
          
          flutter pub get
          flutter build apk --release
          
          ls -la build/app/outputs/flutter-apk/
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/flexyemen/build/app/outputs/flutter-apk/*.apk
