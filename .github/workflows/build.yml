name: Build Flex Yemen

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      
      - name: Build
        run: |
          cd /tmp
          flutter create --org com.flexyemen --project-name flexyemen .
          cd flexyemen
          
          cp -r $GITHUB_WORKSPACE/lib .
          cp -r $GITHUB_WORKSPACE/assets . 2>/dev/null || true
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          
          mkdir -p assets/images assets/icons assets/fonts assets/animations
          touch .env
          
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          sed -i '/android {/a\    ndkVersion "27.0.12077973"' android/app/build.gradle
          sed -i '/defaultConfig {/a\        multiDexEnabled true' android/app/build.gradle
          
          cat >> android/app/build.gradle << 'EOF2'
          
          android {
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          
          dependencies {
              implementation 'androidx.multidex:multidex:2.0.1'
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
          }
EOF2
          
          cat >> android/app/src/main/AndroidManifest.xml << 'EOF3'
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
    <uses-permission android:name="android.permission.CAMERA" />
    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
    <uses-permission android:name="android.permission.VIBRATE" />
    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
EOF3
          
          flutter pub get
          flutter build apk --release
          
          ls -la build/app/outputs/flutter-apk/
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/flexyemen/build/app/outputs/flutter-apk/*.apk
