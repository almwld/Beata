name: Build Flex Yemen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Android folder
        run: |
          # إنشاء مجلد مؤقت للمشروع
          flutter create --platforms=android --project-name=flex_yemen --org com.flexyemen ./temp_project
          
          # نسخ مجلد android إلى المشروع الحالي
          cp -r temp_project/android .
          
          # تنظيف الملفات المؤقتة
          rm -rf temp_project

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
