name: Build Flex Yemen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Android files
        run: |
          mkdir -p android/app/src/main/kotlin/com/flexyemen/flex_yemen
          mkdir -p android/gradle/wrapper
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          # إنشاء أيقونة وهمية (1x1 بكسل PNG)
          echo 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==' | base64 -d > android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          # gradle.properties لتفعيل AndroidX
          echo 'android.useAndroidX=true
          android.enableJetifier=true' > android/gradle.properties
          
          echo 'buildscript {
              ext.kotlin_version = "1.9.22"
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath "com.android.tools.build:gradle:7.3.0"
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = "../build"
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(":app")
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }' > android/build.gradle
          
          echo 'def localProperties = new Properties()
          def localPropertiesFile = rootProject.file("local.properties")
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader("UTF-8") { reader ->
                  localProperties.load(reader)
              }
          }
          def flutterRoot = localProperties.getProperty("flutter.sdk")
          if (flutterRoot == null) {
              throw new GradleException("Flutter SDK not found.")
          }
          def flutterVersionCode = localProperties.getProperty("flutter.versionCode", "1")
          def flutterVersionName = localProperties.getProperty("flutter.versionName", "1.0")
          apply plugin: "com.android.application"
          apply plugin: "kotlin-android"
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          android {
              namespace "com.flexyemen.flex_yemen"
              compileSdk 34
              ndkVersion flutter.ndkVersion
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = "1.8"
              }
              sourceSets {
                  main.java.srcDirs += "src/main/kotlin"
              }
              defaultConfig {
                  applicationId "com.flexyemen.flex_yemen"
                  minSdk 21
                  targetSdk 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          flutter {
              source "../.."
          }
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
          }' > android/app/build.gradle
          
          echo 'include ":app"' > android/settings.gradle
          
          echo 'distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-all.zip' > android/gradle/wrapper/gradle-wrapper.properties
          
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Flex Yemen" android:name="${applicationName}" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>' > android/app/src/main/AndroidManifest.xml
          
          echo 'package com.flexyemen.flex_yemen
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()' > android/app/src/main/kotlin/com/flexyemen/flex_yemen/MainActivity.kt
          
          echo '<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
              </style>
          </resources>' > android/app/src/main/res/values/styles.xml
          
          echo '<?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/white"/>
          </layer-list>' > android/app/src/main/res/drawable/launch_background.xml
          
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
