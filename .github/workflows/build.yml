name: Build Flex Yemen

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create fresh Flutter project
        run: |
          mkdir -p /tmp/fresh_project
          cd /tmp/fresh_project
          flutter create --org com.flexyemen --project-name flexy .
          cp -r ${{ github.workspace }}/lib /tmp/fresh_project/
          cp -r ${{ github.workspace }}/assets /tmp/fresh_project/ 2>/dev/null || true
          cp ${{ github.workspace }}/pubspec.yaml /tmp/fresh_project/
          rm -rf ${{ github.workspace }}/android ${{ github.workspace }}/ios
          cp -r /tmp/fresh_project/android ${{ github.workspace }}/
          cp -r /tmp/fresh_project/ios ${{ github.workspace }}/ 2>/dev/null || true
          cp /tmp/fresh_project/pubspec.yaml ${{ github.workspace }}/
          cd ${{ github.workspace }}
          flutter clean
          flutter pub get
          
          # إضافة coreLibraryDesugaring
          echo "" >> android/app/build.gradle
          echo "android {" >> android/app/build.gradle
          echo "    compileOptions {" >> android/app/build.gradle
          echo "        coreLibraryDesugaringEnabled true" >> android/app/build.gradle
          echo "    }" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle
          echo "" >> android/app/build.gradle
          echo "dependencies {" >> android/app/build.gradle
          echo "    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle
          
          # إضافة الأذونات
          echo "" >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.INTERNET" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.CAMERA" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.VIBRATE" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />' >> android/app/src/main/AndroidManifest.xml
          
          # تحديث minSdkVersion
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-app
          path: build/app/outputs/flutter-apk/app-release.apk
