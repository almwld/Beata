name: Flutter Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Build APK
      run: |
        # إنشاء مشروع جديد
        cd /tmp
        flutter create --org com.flexyemen --project-name flex_yemen --platforms android .
        
        # نسخ الكود من المستودع إلى المشروع الجديد
        cp -r $GITHUB_WORKSPACE/lib .
        cp -r $GITHUB_WORKSPACE/assets . 2>/dev/null || true
        cp $GITHUB_WORKSPACE/pubspec.yaml .
        
        # إنشاء المجلدات المطلوبة
        mkdir -p assets/images assets/icons assets/fonts assets/animations
        touch .env
        
        # إضافة الأذونات إلى AndroidManifest
        sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
        
        # إضافة NDK version و desugaring
        cat >> android/app/build.gradle << 'APPEND'
        
        android {
            ndkVersion "27.0.12077973"
            compileOptions {
                coreLibraryDesugaringEnabled true
            }
            defaultConfig {
                multiDexEnabled true
            }
            buildTypes {
                release {
                    minifyEnabled true
                    shrinkResources true
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
            }
        }
        
        dependencies {
            coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
        }
APPEND
        
        # تثبيت الاعتماديات
        flutter pub get
        
        # بناء APK
        flutter build apk --release --split-per-abi
        
        # نسخ APK إلى مسار العمل
        mkdir -p $GITHUB_WORKSPACE/build
        cp -r build/app/outputs/flutter-apk/*.apk $GITHUB_WORKSPACE/build/ 2>/dev/null || true
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: /tmp/flex_yemen/build/app/outputs/flutter-apk/*.apk
