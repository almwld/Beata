name: Build Flex Yemen

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Build APK
        run: |
          # إنشاء مشروع Flutter جديد في مجلد مؤقت
          cd /tmp
          rm -rf flexyemen_build
          flutter create --org com.flexyemen --project-name flexyemen_build .
          cd flexyemen_build
          
          # نسخ الكود من المستودع
          cp -r $GITHUB_WORKSPACE/lib .
          cp -r $GITHUB_WORKSPACE/assets . 2>/dev/null || true
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          
          # إنشاء مجلدات assets
          mkdir -p assets/images assets/icons assets/fonts assets/animations
          touch .env
          
          # تحديث minSdkVersion إلى 21
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          
          # إضافة coreLibraryDesugaring
          sed -i '/android {/a\    compileOptions {\n        coreLibraryDesugaringEnabled true\n    }' android/app/build.gradle
          sed -i '/dependencies {/a\    coreLibraryDesugaring '\''com.android.tools:desugar_jdk_libs:2.0.4'\''' android/app/build.gradle
          
          # إضافة NDK version
          sed -i '/android {/a\    ndkVersion "27.0.12077973"' android/app/build.gradle
          
          # إضافة multiDexEnabled
          sed -i '/defaultConfig {/a\        multiDexEnabled true' android/app/build.gradle
          
          # إضافة الأذونات
          sed -i '/<\/manifest>/i\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />' android/app/src/main/AndroidManifest.xml
          
          # تثبيت الاعتماديات
          flutter pub get
          
          # بناء APK
          flutter build apk --release
          
          echo "=== Build completed ==="
          ls -la build/app/outputs/flutter-apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-app
          path: /tmp/flexyemen_build/build/app/outputs/flutter-apk/*.apk
