name: Flutter Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      
      - name: Build APK
        run: |
          # إنشاء مشروع جديد
          cd /tmp
          flutter create --org com.flexyemen --project-name flex_yemen --platforms android .
          
          # نسخ الكود
          cp -r $GITHUB_WORKSPACE/lib .
          cp -r $GITHUB_WORKSPACE/assets . 2>/dev/null || true
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          
          # إنشاء مجلدات assets
          mkdir -p assets/images assets/icons assets/fonts assets/animations
          touch .env
          
          # إضافة الأذونات
          echo '<uses-permission android:name="android.permission.INTERNET" />' >> android/app/src/main/AndroidManifest.xml
          echo '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' >> android/app/src/main/AndroidManifest.xml
          echo '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' >> android/app/src/main/AndroidManifest.xml
          echo '<uses-permission android:name="android.permission.CAMERA" />' >> android/app/src/main/AndroidManifest.xml
          echo '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' >> android/app/src/main/AndroidManifest.xml
          echo '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' >> android/app/src/main/AndroidManifest.xml
          
          # إضافة NDK
          echo 'android.ndkVersion = "27.0.12077973"' >> android/app/build.gradle
          echo 'android.defaultConfig.multiDexEnabled = true' >> android/app/build.gradle
          echo 'android.compileOptions.coreLibraryDesugaringEnabled = true' >> android/app/build.gradle
          echo 'dependencies { coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4" }' >> android/app/build.gradle
          
          # بناء
          flutter pub get
          flutter build apk --release --split-per-abi
          
          # عرض النتيجة
          ls -la build/app/outputs/flutter-apk/
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/flex_yemen/build/app/outputs/flutter-apk/*.apk
